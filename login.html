<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Daily Digest — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .icon { font-size: 40px; }
    .logo h1 { font-size: 20px; font-weight: 700; margin-top: 8px; color: #1a1a2e; }
    .logo p  { font-size: 13px; color: #666; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }
    input:focus { border-color: #ff0000; box-shadow: 0 0 0 3px #fee2e2; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: background .15s;
    }
    .btn:hover { background: #cc0000; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .error {
      background: #fee2e2;
      color: #dc2626;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">📺</div>
      <h1>YouTube Daily Digest</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">Sign In</button>
    <div class="error" id="error-msg"></div>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const btn      = document.getElementById('btn-login');
      const errorEl  = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          showError(data.message || 'Login failed.');
        }
      } catch (e) {
        showError('Could not connect to server.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
